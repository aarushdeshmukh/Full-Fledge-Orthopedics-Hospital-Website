{% extends 'base.html' %}
{% block title %}Login — Sonavane Hospital{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px;">
        <div class="logo-cross"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
        <span style="font-family:var(--font-head);font-size:1.1rem;">Sonavane Hospital</span>
      </div>
      <h2>Patient Login</h2>
      <p>Login to book and manage your appointments</p>
    </div>
    <form method="POST">
      <div class="form-group"><label>Email Address</label><input type="email" name="email" required placeholder="you@example.com"></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" required placeholder="Your password"></div>
      <button type="submit" class="btn-primary" style="width:100%;margin-top:8px;">Login</button>
    </form>
    <p class="auth-link">New patient? <a href="{{ url_for('register') }}">Register here</a></p>
    <p class="auth-link" style="margin-top:8px;"><a href="{{ url_for('admin_login') }}" style="color:var(--gray);font-size:0.75rem;">Admin Login</a></p>
  </div>
</div>
{% endblock %}
