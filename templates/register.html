{% extends 'base.html' %}
{% block title %}Register — Sonavane Hospital{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card" style="max-width:500px;">
    <div class="auth-header">
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px;">
        <div class="logo-cross"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
        <span style="font-family:var(--font-head);font-size:1.1rem;">Sonavane Hospital</span>
      </div>
      <h2>Patient Registration</h2>
      <p>Create your account to book appointments</p>
    </div>
    <form method="POST">
      <div class="form-row">
        <div class="form-group"><label>Full Name</label><input type="text" name="name" required placeholder="Your full name"></div>
        <div class="form-group"><label>Phone</label><input type="tel" name="phone" placeholder="+91 98765 43210"></div>
      </div>
      <div class="form-group"><label>Email Address</label><input type="email" name="email" required placeholder="you@example.com"></div>
      <div class="form-row">
        <div class="form-group"><label>Age</label><input type="number" name="age" placeholder="Your age"></div>
        <div class="form-group"><label>Gender</label>
          <select name="gender"><option value="">Select</option><option value="Male">Male</option><option value="Female">Female</option><option value="Other">Other</option></select>
        </div>
      </div>
      <div class="form-group"><label>Password</label><input type="password" name="password" required placeholder="Choose a password" minlength="6"></div>
      <button type="submit" class="btn-primary" style="width:100%;margin-top:8px;">Create Account</button>
    </form>
    <p class="auth-link">Already registered? <a href="{{ url_for('login') }}">Login here</a></p>
  </div>
</div>
{% endblock %}
